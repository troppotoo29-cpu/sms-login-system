
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
 
<title>Attendance Dashboard</title>
 
<style>
 
body{
font-family:Arial,sans-serif;
padding:20px;
background:#f4f6f9;
}
 
h1{
text-align:center;
color:#1a237e;
margin-bottom:20px;
}
 
.controls{
margin-bottom:20px;
text-align:center;
}
 
input,select,button{
padding:10px;
margin:5px;
border-radius:6px;
border:1px solid #ccc;
}
 
button{
background:#1565c0;
color:white;
border:none;
cursor:pointer;
font-weight:bold;
}
 
button:hover{
background:#0d47a1;
}
 
.cards{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}
 
.card{
padding:15px;
border-radius:12px;
color:white;
min-width:180px;
text-align:center;
font-weight:bold;
box-shadow:0 3px 8px rgba(0,0,0,.2);
}
 
.total-card{
background:#1565c0;
}
 
.present-card{
background:#2e7d32;
}
 
.late-card{
background:#ef6c00;
}
 
.absent-card{
background:#c62828;
}
 
table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:10px;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,.15);
}
 
th,td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}
 
.present-table th{
background:#2e7d32;
color:white;
}
 
.late-title{
background:#ef6c00;
color:black;
}
 
.absent-title{
background:#c62828;
color:black;
}
 
.section{
margin-top:25px;
}
 
h2{
padding:10px;
border-radius:6px;
color:white;
}
 
.present-title{
background:#2e7d32;
}
 
.late-title{
background:#ef6c00;
}
 
.absent-title{
background:#c62828;
}
  @media print{
 
button,
.controls{
display:none;
}
 
body{
background:white;
padding:0;
}
 
.cards{
margin-bottom:20px;
}
 
table{
box-shadow:none;
}
 
h1{
text-align:center;
}
 
}
</style>
  
 
</head>
 
<body>
 
<h1>Attendance Dashboard</h1>
 
<div class="controls">
 
<select id="classSelect">
<option value="">Loading Classes...</option>
</select>
<input
type="date"
id="dateInput">
 
<button onclick="loadStudents()">
LOAD
</button>
 
<button onclick="window.print()">
PRINT REPORT
</button>
 
</div>
 
<div class="cards">
 
<div class="card total-card">
<h3>Total</h3>
<h2 id="totalCount">0</h2>
</div>
 
<div class="card present-card">
<h3>Present</h3>
<h2 id="presentCount">0</h2>
</div>
 
<div class="card late-card">
<h3>Late</h3>
<h2 id="lateCount">0</h2>
</div>
 
<div class="card absent-card">
<h3>Absent</h3>
<h2 id="absentCount">0</h2>
</div>
 
</div>
 
<div class="section">
 
<h2 class="present-title">Present Students</h2>
 
<table class="present-table">
<thead>
<tr>
<th>ADM</th>
<th>Name</th>
<th>Login</th>
<th>Logout</th>
</tr>
</thead>
<tbody id="presentBody"></tbody>
</table>
 
</div>
 
<div class="section">
 
<h2>Late Students</h2>
 
<table>
<thead>
<tr>
<th>ADM</th>
<th>Name</th>
<th>Login</th>
<th>Logout</th>
</tr>
</thead>
<tbody id="lateBody"></tbody>
</table>
 
</div>
 
<div class="section">
 
<h2>Absent Students</h2>
 
<table>
<thead>
<tr>
<th>ADM</th>
<th>Name</th>
<th>Status</th>
</tr>
</thead>
<tbody id="absentBody"></tbody>
</table>
 
</div>
 
<script>

 
async function loadClasses(){

  try{

    const select =
      document.getElementById("classSelect");

    select.innerHTML =
      "<option>Loading...</option>";

    const response = await fetch(
      "https://script.google.com/macros/s/AKfycbykjAy972Z64mguU--RkfWTmW_Of2iSOz8p3CoviAzIfxcQ-Kz_QWZjrntECcqF-2MiAw/exec?action=classes"
    );

    const text =
      await response.text();

    console.log(text);

    const classes =
      JSON.parse(text);

    select.innerHTML =
      "<option value=''>Select Class</option>";

    classes.forEach(className => {

      const option =
        document.createElement("option");

      option.value = className;
      option.textContent = className;

      select.appendChild(option);

    });

  }
  catch(error){

    alert(
      "LOAD CLASSES ERROR: " +
      error
    );

    console.log(error);

  }

}
async function loadStudents(){
 
try{
 
const className =
document.getElementById("classSelect").value;
 
const date =
document.getElementById("dateInput").value;
 
const url =
"https://script.google.com/macros/s/AKfycbykjAy972Z64mguU--RkfWTmW_Of2iSOz8p3CoviAzIfxcQ-Kz_QWZjrntECcqF-2MiAw/exec?class="
+ encodeURIComponent(className)
+ "&date="
+ encodeURIComponent(date);
 
const response = await fetch(url);
 
const text = await response.text();
 
alert(text);
 
const data = JSON.parse(text);
 
// DEBUG (IMPORTANT)
console.log(data);
 
// =====================
// COUNTS
// =====================
document.getElementById("totalCount").textContent = data.totalStudents || 0;
document.getElementById("presentCount").textContent = data.presentCount || 0;
document.getElementById("lateCount").textContent = data.lateCount || 0;
document.getElementById("absentCount").textContent = data.absentCount || 0;
 
// =====================
// TABLES
// =====================
const presentBody = document.getElementById("presentBody");
const lateBody = document.getElementById("lateBody");
const absentBody = document.getElementById("absentBody");
 
presentBody.innerHTML = "";
lateBody.innerHTML = "";
absentBody.innerHTML = "";
 
// PRESENT
(data.presentStudents || []).forEach(s => {

const loginTime =
s.login
? String(s.login).match(/\d{2}:\d{2}:\d{2}/)?.[0] || ""
: "";

const logoutTime =
s.logout
? String(s.logout).match(/\d{2}:\d{2}:\d{2}/)?.[0] || ""
: "";

presentBody.innerHTML += `
<tr>
<td>${s.adm}</td>
<td>${s.name}</td>
<td>${loginTime}</td>
<td>${logoutTime}</td>
</tr>
`;

});
 
 
/// LATE
(data.lateStudents || []).forEach(s => {
 
const loginTime =
s.login
? String(s.login).match(/\d{2}:\d{2}:\d{2}/)?.[0] || ""
: "";
 
const logoutTime =
s.logout
? String(s.logout).match(/\d{2}:\d{2}:\d{2}/)?.[0] || ""
: "";
 
lateBody.innerHTML += `
<tr>
<td>${s.adm}</td>
<td>${s.name}</td>
<td>${loginTime}</td>
<td>${logoutTime}</td>
</tr>
`;
 
});
 
// ABSENT
(data.absentStudents || []).forEach(s => {
 
absentBody.innerHTML += `
<tr>
<td>${s.adm}</td>
<td>${s.name}</td>
<td>${s.status}</td>
</tr>
`;
 
});
 
}
catch(error){
 
alert("ERROR: " + error);
 
}
 
}
window.onload = async function(){
 
document.getElementById("dateInput").value =
new Date().toISOString().split("T")[0];
 
await loadClasses();
 
// only load if class exists
setTimeout(() => {
 
const classSelect = document.getElementById("classSelect");
 
if(classSelect.value && classSelect.value !== ""){
 
  loadStudents();
 
}
 
}, 500);
 
};
</script>
</body>
</html>
