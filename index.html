<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SUPERMARKET POS PRO</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">

<div class="logo">

🛒 SUPERMARKET POS PRO

</div>

<div class="cashier">

Cashier :
<span id="cashierName">

Not Logged In

</span>

</div>

</div>



<div class="mainContainer">

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="loginBox">

<h1>

🛒 SUPERMARKET POS PRO

</h1>

<input
id="username"
placeholder="Username">

<input
id="password"
type="password"
placeholder="Password">

<button id="loginBtn">

LOGIN

</button>

<div id="loginMsg">

</div>

</div>

</div>



<!-- DASHBOARD -->

<div
id="dashboard"
class="mainContainer"
style="display:none;">

<div class="leftPanel">

<h2>

📷 LIVE BARCODE SCANNER

</h2>

<div id="scannerHolder">

<iframe
src="posScanner.html">
</iframe>

</div>

</div>



<div class="rightPanel">

<h2>

Shopping Cart

</h2>

<input
id="search"
placeholder="Search Product">

<div id="results"></div>

<table>

<thead>

<tr>

<th>Product</th>

<th>Qty</th>

<th>Price</th>

<th>Total</th>

<th>X</th>

</tr>

</thead>

<tbody id="cart">

<tr>

<td colspan="5">

No Items

</td>

</tr>

</tbody>

</table>

<div class="summary">

TOTAL :
KSh

<span id="grandTotal">

0.00

</span>

</div>

<div class="payment">

<input
id="amountPaid"
placeholder="Amount Paid">

<select id="paymentMethod">

<option>Cash</option>

<option>Mpesa</option>

<option>Card</option>

</select>

<input
id="change"
placeholder="Balance"
readonly>

<button id="completeSale">

COMPLETE SALE

</button>

</div>

</div>

</div>

<script src="api.js"></script>

<script src="scanner.js"></script>

<script src="app.js"></script>

</body>

</html>
