<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SUPERMARKET POS PRO</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">

<div class="logo">

🛒 SUPERMARKET POS PRO

</div>

<div class="cashier">

Cashier :
<span id="cashierName">

Not Logged In

</span>

</div>

</div>



<div class="mainContainer">



<div class="leftPanel">

<h2>📷 LIVE BARCODE SCANNER</h2>

<div id="scannerHolder">

<iframe
src="posScanner.html"
frameborder="0">
</iframe>

</div>

</div>




<div class="rightPanel">

<h2>Shopping Cart</h2>

<input
id="search"
type="text"
placeholder="Search Product...">

<div id="results"></div>



<table>

<thead>

<tr>

<th>Product</th>

<th>Qty</th>

<th>Price</th>

<th>Total</th>

<th>Remove</th>

</tr>

</thead>

<tbody id="cart">

<tr>

<td colspan="5">

No Items

</td>

</tr>

</tbody>

</table>



<div class="summary">

<h2>

TOTAL :
KSh

<span id="grandTotal">

0.00

</span>

</h2>

</div>



<div class="payment">

<label>

Amount Paid

</label>

<input
id="amountPaid"
type="number">



<label>

Payment Method

</label>

<select id="paymentMethod">

<option>Cash</option>

<option>Mpesa</option>

<option>Card</option>

</select>



<label>

Balance

</label>

<input
id="change"
readonly>



<button id="completeSale">

COMPLETE SALE

</button>

</div>

</div>

</div>



<script src="api.js"></script>

<script src="scanner.js"></script>

<script src="app.js"></script>

</body>

</html>
